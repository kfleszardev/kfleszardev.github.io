---
title: My Watchfaces
order: 2
icon: none
---
<table>
    
    {% for page in site.watchfaces %}
    <tr>
        {% assign mod = forloop.index | modulo:2 %}
        {% if mod == 1 %}
        <td style="text-align: left;">
        {% else %}
        <td style="text-align: right;">
        {% endif %}
            <a href="{{ page.url }}"><img src="{{ page.banner }}" alt="{{ page.banner-alt }}" style="width: 60%;"></a>
        </td>
    </tr>
    {% endfor %}

</table>
